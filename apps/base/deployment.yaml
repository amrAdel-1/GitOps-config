apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
spec:
  selector:
    matchLabels:
      app: gitops-app-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: amradel2002/gitops-app:b1cce81acfda0d0345609b90eb6cd8f583ea9012
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 5000


